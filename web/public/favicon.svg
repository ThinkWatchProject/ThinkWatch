<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- background -->
  <rect width="32" height="32" rx="7" fill="#1E2A4A"/>
  <!-- shield outline (eye eyelid) -->
  <rect x="6" y="9" width="20" height="14" rx="4"
        fill="none" stroke="#3DDBD9" stroke-width="2"/>
  <!-- inflow stripes (3 channels merging into the shield) -->
  <line x1="2"  y1="13" x2="6" y2="13" stroke="#3DDBD9" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="2"  y1="16" x2="6" y2="16" stroke="#3DDBD9" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="2"  y1="19" x2="6" y2="19" stroke="#3DDBD9" stroke-width="1.6" stroke-linecap="round"/>
  <!-- outflow stripe (single trusted path) -->
  <line x1="26" y1="16" x2="30" y2="16" stroke="#3DDBD9" stroke-width="1.6" stroke-linecap="round"/>
  <!-- AI packet pupil: rotated square -->
  <rect x="13" y="13" width="6" height="6" rx="0.6"
        fill="#3DDBD9" transform="rotate(45 16 16)"/>
</svg>
