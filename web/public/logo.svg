<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <!-- icon block (deep indigo background) -->
  <rect width="40" height="40" rx="9" fill="#1E2A4A"/>
  <!-- eye outline -->
  <path d="M4 20 Q 20 7, 36 20 Q 20 33, 4 20 Z"
        fill="none" stroke="#3DDBD9" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- lowercase w pupil -->
  <polyline points="11,16 15,25 20,18 25,25 29,16"
            fill="none" stroke="#3DDBD9" stroke-width="2.6"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- wordmark -->
  <text x="52" y="27"
        font-family="Geist, 'Inter Display', Inter, system-ui, -apple-system, sans-serif"
        font-size="20"
        letter-spacing="-0.4"
        fill="currentColor">
    <tspan font-weight="500">Think</tspan><tspan font-weight="700">Watch</tspan>
  </text>
</svg>
