<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <!-- icon block (deep indigo background) -->
  <rect width="40" height="40" rx="9" fill="#1E2A4A"/>
  <rect x="4" y="4" width="32" height="32" rx="7"
        fill="none" stroke="#3DDBD9" stroke-width="2.2"/>
  <!-- T -->
  <line x1="11" y1="12" x2="29" y2="12" stroke="#3DDBD9" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="20" y1="12" x2="20" y2="20" stroke="#3DDBD9" stroke-width="2.6" stroke-linecap="round"/>
  <!-- W -->
  <polyline points="11,20 15,28 20,20" fill="none" stroke="#3DDBD9" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="20,20 25,28 29,20" fill="none" stroke="#3DDBD9" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- wordmark -->
  <text x="52" y="27"
        font-family="Geist, 'Inter Display', Inter, system-ui, -apple-system, sans-serif"
        font-size="20"
        letter-spacing="-0.4"
        fill="currentColor">
    <tspan font-weight="500">Think</tspan><tspan font-weight="700">Watch</tspan>
  </text>
</svg>
