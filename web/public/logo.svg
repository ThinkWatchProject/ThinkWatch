<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 36" fill="none">
  <!-- icon block (deep indigo background) -->
  <rect width="36" height="36" rx="8" fill="#1E2A4A"/>
  <!-- shield outline -->
  <rect x="8" y="10" width="20" height="16" rx="5"
        fill="none" stroke="#3DDBD9" stroke-width="2"/>
  <!-- 3 inflow stripes -->
  <line x1="2" y1="14" x2="8" y2="14" stroke="#3DDBD9" stroke-width="2" stroke-linecap="round"/>
  <line x1="2" y1="18" x2="8" y2="18" stroke="#3DDBD9" stroke-width="2" stroke-linecap="round"/>
  <line x1="2" y1="22" x2="8" y2="22" stroke="#3DDBD9" stroke-width="2" stroke-linecap="round"/>
  <!-- single outflow -->
  <line x1="28" y1="18" x2="34" y2="18" stroke="#3DDBD9" stroke-width="2" stroke-linecap="round"/>
  <!-- AI packet pupil -->
  <rect x="14.5" y="14.5" width="7" height="7" rx="0.8"
        fill="#3DDBD9" transform="rotate(45 18 18)"/>

  <!-- wordmark -->
  <text x="48" y="24"
        font-family="Geist, 'Inter Display', Inter, system-ui, -apple-system, sans-serif"
        font-size="18"
        letter-spacing="-0.3"
        fill="currentColor">
    <tspan font-weight="500">Think</tspan><tspan font-weight="700">Watch</tspan>
  </text>
</svg>
