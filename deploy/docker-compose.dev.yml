services:
  postgres:
    image: postgres:18-alpine
    command:
      - postgres
      # --- Memory ---
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - wal_buffers=8MB
      # --- WAL / Checkpoints ---
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_compression=zstd
      # --- I/O ---
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      # --- Connections & safety ---
      - -c
      - idle_in_transaction_session_timeout=30s
      - -c
      - statement_timeout=60s
      # --- Planner ---
      - -c
      - default_statistics_target=200
      - -c
      - jit=off
      # --- Slow query log (dev: log everything > 200ms) ---
      - -c
      - log_min_duration_statement=200
      - -c
      - log_lock_waits=on
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_bastion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    command: redis-server /etc/redis/redis.conf --requirepass devredispass
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devredispass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- ClickHouse (log storage & search) ---
  clickhouse:
    image: clickhouse/clickhouse-server:26.3-alpine
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP
    environment:
      CLICKHOUSE_USER: bastion
      CLICKHOUSE_PASSWORD: bastion_dev
      CLICKHOUSE_DB: agent_bastion
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./clickhouse/config.d/:/etc/clickhouse-server/config.d/:ro
      - ./clickhouse/users.d/:/etc/clickhouse-server/users.d/
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Zitadel (OIDC / SSO provider for development) ---
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.13.1
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      ZITADEL_MASTERKEY: "agent_bastion_dev_masterkey1XXXX" # exactly 32 chars
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel_db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: "admin"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "Admin1234!"
      ZITADEL_TELEMETRY_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      zitadel_db:
        condition: service_healthy

  zitadel_db:
    image: postgres:18-alpine
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=384MB
      - -c
      - work_mem=4MB
      - -c
      - jit=off
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zitadel
    volumes:
      - zitadel_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
  clickhouse_data:
  zitadel_db_data:
