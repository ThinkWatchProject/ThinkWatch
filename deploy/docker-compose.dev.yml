services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_bastion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    command: redis-server --requirepass devredispass
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devredispass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- S3-compatible storage for Quickwit ---
  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.90
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: rustfs_admin
      RUSTFS_SECRET_KEY: rustfs_secret
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Create the quickwit bucket on startup
  rustfs-init:
    image: rustfs/rustfs:1.0.0-alpha.90
    entrypoint: /bin/sh
    command: >
      -c "
      until curl -sf http://rustfs:9000/health; do sleep 1; done;
      rustfs-client alias set local http://rustfs:9000 rustfs_admin rustfs_secret;
      rustfs-client mb local/quickwit --ignore-existing;
      echo 'Bucket quickwit created';
      "
    depends_on:
      rustfs:
        condition: service_healthy

  # --- Quickwit (audit log search engine) ---
  quickwit:
    image: quickwit/quickwit:0.8.1
    command: run
    ports:
      - "7280:7280"
    environment:
      QW_DEFAULT_INDEX_ROOT_URI: s3://quickwit
      QW_LISTEN_ADDRESS: 0.0.0.0
      AWS_ACCESS_KEY_ID: rustfs_admin
      AWS_SECRET_ACCESS_KEY: rustfs_secret
      AWS_ENDPOINT_URL: http://rustfs:9000
      AWS_REGION: us-east-1
      # Force path-style for S3 (required for RustFS/MinIO)
      AWS_FORCE_PATH_STYLE: "true"
    volumes:
      - quickwit_data:/quickwit/qwdata
    depends_on:
      rustfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7280/health/readyz"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Zitadel (OIDC / SSO provider for development) ---
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.13.1
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      ZITADEL_MASTERKEY: "agent_bastion_dev_masterkey1" # exactly 32 chars
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel_db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: "admin"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "Admin1234!"
    ports:
      - "8080:8080"
    depends_on:
      zitadel_db:
        condition: service_healthy

  zitadel_db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zitadel
    volumes:
      - zitadel_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
  rustfs_data:
  quickwit_data:
  zitadel_db_data:
