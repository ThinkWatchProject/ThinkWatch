version: "0.7"
index_id: platform_logs
doc_mapping:
  mode: dynamic
  field_mappings:
    - name: id
      type: text
      tokenizer: raw
      fast: true
    - name: user_id
      type: text
      tokenizer: raw
      fast: true
    - name: action
      type: text
      tokenizer: raw
      fast: true
    - name: resource
      type: text
      tokenizer: raw
      fast: true
    - name: resource_id
      type: text
      tokenizer: raw
      fast: true
    - name: detail
      type: json
    - name: ip_address
      type: ip
    - name: user_agent
      type: text
    - name: created_at
      type: datetime
      input_formats:
        - iso8601
        - unix_timestamp
      output_format: iso8601
      fast: true
      fast_precision: seconds
  timestamp_field: created_at
indexing_settings:
  commit_timeout_secs: 10
search_settings:
  default_search_fields:
    - action
    - resource
retention:
  period: 90 days
  schedule: daily
