version: "0.7"
index_id: gateway_logs
doc_mapping:
  mode: dynamic
  field_mappings:
    - name: id
      type: text
      tokenizer: raw
      fast: true
    - name: user_id
      type: text
      tokenizer: raw
      fast: true
    - name: api_key_id
      type: text
      tokenizer: raw
      fast: true
    - name: model_id
      type: text
      tokenizer: raw
      fast: true
    - name: provider
      type: text
      tokenizer: raw
      fast: true
    - name: input_tokens
      type: i64
      fast: true
    - name: output_tokens
      type: i64
      fast: true
    - name: cost_usd
      type: f64
      fast: true
    - name: latency_ms
      type: i64
      fast: true
    - name: status_code
      type: i64
      fast: true
    - name: ip_address
      type: ip
    - name: user_agent
      type: text
    - name: detail
      type: json
    - name: created_at
      type: datetime
      input_formats:
        - iso8601
        - unix_timestamp
      output_format: iso8601
      fast: true
      fast_precision: seconds
  timestamp_field: created_at
indexing_settings:
  commit_timeout_secs: 10
search_settings:
  default_search_fields:
    - model_id
    - provider
retention:
  period: 90 days
  schedule: daily
