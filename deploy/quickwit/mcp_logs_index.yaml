version: "0.7"
index_id: mcp_logs
doc_mapping:
  mode: dynamic
  field_mappings:
    - name: id
      type: text
      tokenizer: raw
      fast: true
    - name: user_id
      type: text
      tokenizer: raw
      fast: true
    - name: server_id
      type: text
      tokenizer: raw
      fast: true
    - name: server_name
      type: text
      tokenizer: raw
      fast: true
    - name: tool_name
      type: text
      tokenizer: raw
      fast: true
    - name: duration_ms
      type: i64
      fast: true
    - name: status
      type: text
      tokenizer: raw
      fast: true
    - name: error_message
      type: text
    - name: ip_address
      type: ip
    - name: detail
      type: json
    - name: created_at
      type: datetime
      input_formats:
        - iso8601
        - unix_timestamp
      output_format: iso8601
      fast: true
      fast_precision: seconds
  timestamp_field: created_at
indexing_settings:
  commit_timeout_secs: 10
search_settings:
  default_search_fields:
    - tool_name
    - server_name
retention:
  period: 90 days
  schedule: daily
