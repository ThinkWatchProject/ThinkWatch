# ============ Memory ============
maxmemory 768mb
maxmemory-policy allkeys-lru

# ============ Persistence: AOF only ============
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
save ""

# ============ Network ============
tcp-keepalive 300
timeout 0
tcp-backlog 511

# ============ Multi-threaded I/O (Redis 7+) ============
io-threads 2
io-threads-do-reads yes

# ============ Performance ============
hz 10
dynamic-hz yes

# Lazy-free: delegate expensive frees to background thread
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

# Active memory defragmentation
activedefrag yes
active-defrag-enabled yes
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25
active-defrag-max-scan-fields 500

# ============ Compact data structures ============
# Keep small aggregates in ziplist/listpack for memory efficiency
hash-max-listpack-entries 128
hash-max-listpack-value 64
list-max-listpack-size -2
zset-max-listpack-entries 128
zset-max-listpack-value 64
set-max-listpack-entries 128
set-max-intset-entries 512

# ============ Logging ============
loglevel notice
