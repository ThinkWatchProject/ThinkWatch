replicaCount: 1

image:
  server:
    repository: ghcr.io/agentbastion/agent-bastion-server
    tag: latest
    pullPolicy: Always
  web:
    repository: ghcr.io/agentbastion/agent-bastion-web
    tag: latest
    pullPolicy: Always

service:
  gateway:
    type: ClusterIP
    port: 3000
  console:
    type: ClusterIP
    port: 3001
  web:
    type: ClusterIP
    port: 80

ingress:
  enabled: false
  className: nginx
  annotations: {}
  # Gateway ingress — public
  gateway:
    host: gateway.example.com
    tls: []
  # Console ingress — internal
  console:
    host: console.internal.example.com
    tls: []

config:
  corsOrigins: "https://console.internal.example.com"
  rustLog: "info,agent_bastion=info"

# External secrets — provide via --set or external secrets operator
secrets:
  jwtSecret: ""
  encryptionKey: ""
  databaseUrl: ""
  redisUrl: ""
  oidcClientId: ""
  oidcClientSecret: ""
  oidcIssuerUrl: ""
  oidcRedirectUrl: ""

quickwit:
  enabled: true
  url: "http://quickwit:7280"
  index: "audit_logs"
  storage:
    # S3-compatible object storage for Quickwit index data.
    # Default: uses the bundled RustFS instance.
    # For cloud-native deployments, point to AWS S3, GCS, or Azure Blob:
    #   uri: "s3://my-bucket/quickwit"
    #   endpoint: ""                       # omit for real AWS S3
    #   region: "us-west-2"
    #   forcePathStyle: false
    #   accessKeyId / secretAccessKey: use ExternalSecret or IRSA instead
    uri: "s3://quickwit"
    endpoint: "http://rustfs:9000"
    region: "us-east-1"
    forcePathStyle: true
    accessKeyId: ""
    secretAccessKey: ""

syslog:
  enabled: false
  addr: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

resources:
  server:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  web:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
