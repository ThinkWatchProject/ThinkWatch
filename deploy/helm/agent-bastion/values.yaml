replicaCount: 1

image:
  server:
    repository: ghcr.io/agentbastion/agent-bastion-server
    tag: latest
    pullPolicy: Always
  web:
    repository: ghcr.io/agentbastion/agent-bastion-web
    tag: latest
    pullPolicy: Always

service:
  gateway:
    type: ClusterIP
    port: 3000
  console:
    type: ClusterIP
    port: 3001
  web:
    type: ClusterIP
    port: 80

ingress:
  enabled: false
  className: nginx
  annotations: {}
  # Gateway ingress — public
  gateway:
    host: gateway.example.com
    tls: []
  # Console ingress — internal
  console:
    host: console.internal.example.com
    tls: []

config:
  corsOrigins: "https://console.internal.example.com"
  rustLog: "info,agent_bastion=info"

# External secrets — provide via --set or external secrets operator
secrets:
  jwtSecret: ""
  encryptionKey: ""
  databaseUrl: ""
  redisUrl: ""
  oidcClientId: ""
  oidcClientSecret: ""
  oidcIssuerUrl: ""
  oidcRedirectUrl: ""

clickhouse:
  enabled: true
  url: "http://clickhouse:8123"
  db: "agent_bastion"
  user: "bastion"
  password: ""  # stored in Secret, not ConfigMap
  # Deploy optimized ClickHouse config as ConfigMaps
  # Mount these into your ClickHouse StatefulSet / Operator CR
  configMaps:
    enabled: true

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Pod disruption budget (enabled when replicaCount > 1 or autoscaling)
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Graceful shutdown
terminationGracePeriodSeconds: 30

# Pod scheduling
podAntiAffinity:
  enabled: true
  # preferred (soft) or required (hard)
  type: preferred

topologySpreadConstraints:
  enabled: false
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone

resources:
  server:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  web:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
