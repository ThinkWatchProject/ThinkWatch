replicaCount: 1

image:
  server:
    repository: ghcr.io/thinkwatch/think-watch-server
    # Defaults to .Chart.AppVersion when empty
    tag: ""
    pullPolicy: IfNotPresent
  web:
    repository: ghcr.io/thinkwatch/think-watch-web
    tag: ""
    pullPolicy: IfNotPresent

service:
  gateway:
    type: ClusterIP
    port: 3000
  console:
    type: ClusterIP
    port: 3001
  web:
    type: ClusterIP
    port: 80

ingress:
  enabled: false
  className: nginx
  annotations: {}
  gateway:
    host: gateway.example.com
    tls: []
  console:
    host: console.internal.example.com
    tls: []

config:
  corsOrigins: "https://console.internal.example.com"
  rustLog: "info,think_watch=info"

# Secrets — leave empty to auto-generate on first install.
# Values are preserved across `helm upgrade` via the chart's lookup pattern.
# Override here or with --set to pin specific values.
secrets:
  jwtSecret: ""
  encryptionKey: ""
  oidcClientId: ""
  oidcClientSecret: ""
  oidcIssuerUrl: ""
  oidcRedirectUrl: ""

# ---- Bundled databases (in-chart StatefulSets) ----
# Set `bundled: false` to use an external service; then set `externalUrl`.

postgres:
  bundled: true
  image: postgres:18-alpine
  user: thinkwatch
  database: think_watch
  # Used only when bundled=false; e.g. postgres://user:pass@host:5432/db
  externalUrl: ""
  storage: 10Gi
  storageClassName: ""
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

redis:
  bundled: true
  image: redis:8-alpine
  # Used only when bundled=false; e.g. redis://:pass@host:6379
  externalUrl: ""
  storage: 2Gi
  storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 1Gi

clickhouse:
  bundled: true
  image: clickhouse/clickhouse-server:26.3-alpine
  user: thinkwatch
  database: think_watch
  # Used only when bundled=false; e.g. http://host:8123
  externalUrl: ""
  storage: 20Gi
  storageClassName: ""
  # Mount the chart's optimized config + init SQL ConfigMaps into the bundled
  # ClickHouse pod. Ignored when bundled=false.
  configMaps:
    enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

networkPolicy:
  enabled: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: false
  minAvailable: 1

terminationGracePeriodSeconds: 30

podAntiAffinity:
  enabled: true
  type: preferred

topologySpreadConstraints:
  enabled: false
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone

resources:
  server:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  web:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
