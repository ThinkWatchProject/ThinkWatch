{{/*
App secret — auto-generates missing values on first install, preserves
them across upgrades by reading back the existing Secret via `lookup`.
Explicit `.Values.secrets.*` and `externalUrl` overrides always win.
*/}}
{{- $secretName := include "tw.secret.name" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $prev := dict -}}
{{- if and $existing $existing.data -}}
  {{- $prev = $existing.data -}}
{{- end -}}

{{- define "tw.readOrGen" -}}
{{- $prev := index . 0 -}}
{{- $key := index . 1 -}}
{{- $len := index . 2 -}}
{{- if hasKey $prev $key -}}
{{- index $prev $key | b64dec -}}
{{- else -}}
{{- randAlphaNum $len -}}
{{- end -}}
{{- end -}}

{{- $jwt := .Values.secrets.jwtSecret -}}
{{- if not $jwt -}}{{- $jwt = include "tw.readOrGen" (list $prev "JWT_SECRET" 64) -}}{{- end -}}

{{- $enc := .Values.secrets.encryptionKey -}}
{{- if not $enc -}}{{- $enc = include "tw.readOrGen" (list $prev "ENCRYPTION_KEY" 64) -}}{{- end -}}

{{- $dbPass := include "tw.readOrGen" (list $prev "DB_PASSWORD" 32) -}}
{{- $redisPass := include "tw.readOrGen" (list $prev "REDIS_PASSWORD" 32) -}}
{{- $chPass := include "tw.readOrGen" (list $prev "CLICKHOUSE_PASSWORD" 32) -}}

{{/* DATABASE_URL: bundled → derive; external → require externalUrl */}}
{{- $databaseUrl := "" -}}
{{- if .Values.postgres.bundled -}}
  {{- $databaseUrl = printf "postgres://%s:%s@%s:5432/%s?sslmode=disable" .Values.postgres.user $dbPass (include "tw.postgres.name" .) .Values.postgres.database -}}
{{- else if .Values.postgres.externalUrl -}}
  {{- $databaseUrl = .Values.postgres.externalUrl -}}
{{- else -}}
  {{- fail "postgres.externalUrl is required when postgres.bundled=false" -}}
{{- end -}}

{{/* REDIS_URL */}}
{{- $redisUrl := "" -}}
{{- if .Values.redis.bundled -}}
  {{- $redisUrl = printf "redis://:%s@%s:6379" $redisPass (include "tw.redis.name" .) -}}
{{- else if .Values.redis.externalUrl -}}
  {{- $redisUrl = .Values.redis.externalUrl -}}
{{- else -}}
  {{- fail "redis.externalUrl is required when redis.bundled=false" -}}
{{- end -}}

{{/* CLICKHOUSE_URL */}}
{{- $clickhouseUrl := "" -}}
{{- if .Values.clickhouse.bundled -}}
  {{- $clickhouseUrl = printf "http://%s:8123" (include "tw.clickhouse.name" .) -}}
{{- else if .Values.clickhouse.externalUrl -}}
  {{- $clickhouseUrl = .Values.clickhouse.externalUrl -}}
{{- else -}}
  {{- fail "clickhouse.externalUrl is required when clickhouse.bundled=false" -}}
{{- end -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "tw.labels" . | nindent 4 }}
  annotations:
    # Preserve the auto-generated passwords across helm uninstall/reinstall.
    # Delete the Secret manually if you want a fresh rotation.
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  JWT_SECRET: {{ $jwt | quote }}
  ENCRYPTION_KEY: {{ $enc | quote }}
  DATABASE_URL: {{ $databaseUrl | quote }}
  REDIS_URL: {{ $redisUrl | quote }}
  DB_PASSWORD: {{ $dbPass | quote }}
  REDIS_PASSWORD: {{ $redisPass | quote }}
  CLICKHOUSE_URL: {{ $clickhouseUrl | quote }}
  CLICKHOUSE_DB: {{ .Values.clickhouse.database | quote }}
  CLICKHOUSE_USER: {{ .Values.clickhouse.user | quote }}
  CLICKHOUSE_PASSWORD: {{ $chPass | quote }}
  {{- if .Values.secrets.oidcClientId }}
  OIDC_CLIENT_ID: {{ .Values.secrets.oidcClientId | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcClientSecret }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcIssuerUrl }}
  OIDC_ISSUER_URL: {{ .Values.secrets.oidcIssuerUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcRedirectUrl }}
  OIDC_REDIRECT_URL: {{ .Values.secrets.oidcRedirectUrl | quote }}
  {{- end }}
