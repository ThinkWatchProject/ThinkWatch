apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test-connection
  labels:
    {{- include "tw.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.36
      command:
        - sh
        - -c
        - >-
          set -e;
          echo "→ gateway liveness";
          wget -qO- --timeout=5 http://{{ .Release.Name }}-gateway:{{ .Values.service.gateway.port }}/health/live;
          echo "→ gateway readiness";
          wget -qO- --timeout=5 http://{{ .Release.Name }}-gateway:{{ .Values.service.gateway.port }}/health/ready;
          echo;
          echo "✓ connectivity OK"
