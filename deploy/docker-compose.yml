## Production Docker Compose
## Usage: docker compose -f deploy/docker-compose.yml up -d
##
## Required: create .env.production with real secrets before deploying.

services:
  server:
    image: ghcr.io/agentbastion/agent-bastion-server:${IMAGE_TAG:-latest}
    ports:
      - "${GATEWAY_PORT:-3000}:3000"   # Gateway — expose to clients
      # Console port NOT exposed externally by default
    expose:
      - "3001"   # Console — only accessible within docker network
    environment:
      DATABASE_URL: postgres://${DB_USER:-bastion}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-agent_bastion}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GATEWAY_PORT: "3000"
      CONSOLE_PORT: "3001"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: agent_bastion
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-bastion}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      RUST_LOG: ${RUST_LOG:-info,agent_bastion=info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${SERVER_CPU_LIMIT:-4}"
          memory: ${SERVER_MEM_LIMIT:-4G}
        reservations:
          cpus: "1"
          memory: 1G
    networks:
      - frontend
      - backend
    restart: unless-stopped

  web:
    image: ghcr.io/agentbastion/agent-bastion-web:${IMAGE_TAG:-latest}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    networks:
      - frontend
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    command:
      - postgres
      # --- Memory ---
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - wal_buffers=16MB
      # --- WAL / Checkpoints ---
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - min_wal_size=256MB
      - -c
      - max_wal_size=1GB
      - -c
      - wal_compression=zstd
      # --- I/O ---
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      # --- Parallel query ---
      - -c
      - max_parallel_workers_per_gather=2
      - -c
      - max_parallel_workers=4
      - -c
      - max_worker_processes=8
      # --- Connections & safety ---
      - -c
      - max_connections=100
      - -c
      - idle_in_transaction_session_timeout=30s
      - -c
      - statement_timeout=60s
      # --- Planner ---
      - -c
      - default_statistics_target=200
      - -c
      - huge_pages=off
      - -c
      - jit=off
      # --- Slow query log ---
      - -c
      - log_min_duration_statement=500
      - -c
      - log_checkpoints=on
      - -c
      - log_lock_waits=on
    environment:
      POSTGRES_USER: ${DB_USER:-bastion}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-agent_bastion}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bastion}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: ${PG_MEM_LIMIT:-2G}
    networks:
      - backend
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redisdata:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: ${REDIS_MEM_LIMIT:-1G}
    networks:
      - backend
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:26.3-alpine
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-bastion}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: agent_bastion
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./clickhouse/config.d/:/etc/clickhouse-server/config.d/:ro
      - ./clickhouse/users.d/:/etc/clickhouse-server/users.d/
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: ${CLICKHOUSE_MEM_LIMIT:-2G}
    networks:
      - backend
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  pgdata:
  redisdata:
  clickhouse_data:
